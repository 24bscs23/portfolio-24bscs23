<div class="container">

<h2>Student Course Registration Form</h2>

<form>

<table>

<tr>
<td><label>Full Name</label></td>
<td><input type="text" placeholder="Enter your name" required></td>
</tr>

<tr>
<td><label>Email</label></td>
<td><input type="email" placeholder="Enter your email" required></td>
</tr>

<tr>
<td><label>Password</label></td>
<td><input type="password" placeholder="Enter password" required></td>
</tr>

<tr>
<td><label>Gender</label></td>
<td>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
</td>
</tr>

<tr>
<td><label>Country</label></td>
<td>
<select>
<option>Pakistan</option>
<option>China</option>
<option>Turkey</option>
<option>Saudi Arabia</option>
<option>UAE</option>
</select>
</td>
</tr>

<tr>
<td><label>Select Course</label></td>
<td>
<select>
<option>Web Development</option>
<option>Networking Fundamentals</option>
<option>Ethical Hacking & Cybersecurity</option>
<option>Artificial Intelligence</option>
<option>Machine learning</option>
<option>Cloud Computing </option>
</select>
</td>
</tr>

<tr>
<td><label>Languages</label></td>
<td>
<input type="checkbox"> English
<input type="checkbox"> Urdu
<input type="checkbox"> Arabic
</td>
</tr>

<tr>
<td><label>City</label></td>
<td><input type="text" placeholder="Enter your city"></td>
</tr>

<tr>
<td><label>Date of Birth</label></td>
<td><input type="date"></td>
</tr>

<tr>
<td colspan="2"  align="center">
<input type="submit" value="submit">
<input type="reset" value="reset">
</td>

</tr>

</table>

</form>
